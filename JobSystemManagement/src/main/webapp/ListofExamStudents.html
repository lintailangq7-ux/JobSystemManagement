<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>受験学生一覧</title>
<style>

body{
    margin:0;
    padding:0;
    background:#ffffff;
    font-family:"Yu Gothic","Meiryo",sans-serif;
}

/* ヘッダー */
.top-area{
	display:flex;
	    justify-content:flex-start;
	    align-items:center;
	    margin-bottom:10px;
		gap:10px;
		
}
.top-area h1{
    position:relative;
    margin:0;
    font-size:30px;
    padding:0;
    font-weight:normal;
}

/* 戻るボタン */
.back-btn{
	width: 40px;
			height: 40px;
			border: 1px solid #4aa3df;
		    background: #4aa3df;
			color: #fff35c;
			font-size: 24px;
			cursor: pointer;
			padding: 0;
}



/* 企業名 */
.company{
    width:auto;
    height:auto;
    line-height:75px;
    text-align:center;
    border:none;
    border-radius:40px;
    color:#006fb7;
    font-size:30px;
    font-weight:bold;
}

/* テーブル全体 */
.table-area{
	width: 90%;
    margin-top:20px;
    display:flex;
    justify-content:center;
}

/* テーブル */
table{
    border-collapse:collapse;
    width:100%;
	table-layout: fixed;
}

/* ヘッダー */
th{
    background:#006fb7;
    color:white;
    border:2px solid #222;
    font-size:20px;
    height:45px;
}

/* データ */
td{
    border:2px solid #222;
    text-align:center;
    font-size:18px;
    height:45px;
}

/* ボタン列 */
.btn-col{
    width:60px;
}

/* 詳細ボタン */
.detail-btn{
    width:55px;
    height:40px;
    border-radius:8px;
    background:#bdb7b7;
    border:1px solid #444;
    color:white;
    font-size:26px;
    cursor:pointer;
}

/* スクロールバー */
.scroll{
    position:absolute;
    right:90px;
    top:115px;
    width:28px;
    height:420px;
    background:#777;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.scroll button{
    width:100%;
    height:40px;
    background:#777;
    color:white;
    border:none;
    font-size:20px;
    cursor:pointer;
}

.bar{
    flex:1;
    width:8px;
    background:white;
    margin:5px 0;
}
.class-no{
	width:20%;
}
.number{
	width:20%;
}
.name{
	width:40%;
}
.button-col{
	width:15%;
}

</style>
</head>
<body>
<div class="top-area">
<button class="back-btn" onclick="location.href='Login.html'">◀</button>
<h1>受験学生一覧</h1>
</div>
<div  class="company">
    企業名

</div>
<div class="table-area">
<table>

    <thead>

        <tr>
            <th class="class-no">クラス番号</th>
            <th class="number">出席番号</th>
            <th class="name">氏名</th>
            <th class="button-col">詳細</th>
            
        </tr>

    </thead>

</table>
</div>
</body>
</html>
