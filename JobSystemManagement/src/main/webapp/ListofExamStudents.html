<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>受験学生一覧</title>
<style>

body{
    margin:0;
    padding:0;
    background:#ffffff;
    font-family:"Yu Gothic","Meiryo",sans-serif;
}

/* ヘッダー */
.header{
    display:flex;
    align-items:center;
    justify-content:center;
    margin-top:10px;
    position:relative;
	height: 90px;
}

/* 戻るボタン */
.back-btn{
    position:absolute;
    left:5px;
    width:40px;
    height:40px;
    background:#4b6d8a;
    color:yellow;
    font-size:24px;
    font-weight:bold;
    border:1px solid #333;
    cursor:pointer;
}

/* タイトル */
.title{
    position:absolute;
    left:45px;
    width:285px;
    height:40px;
    line-height:40px;
    text-align:center;
    border:1px solid #3aa0ff;
    font-size:18px;
    font-weight:bold;
    background:white;
}

/* 企業名 */
.company{
    width:320px;
    height:55px;
    line-height:75px;
    text-align:center;
    border:1px solid #6ca0dc;
    border-radius:40px;
    color:#5d92d5;
    font-size:30px;
    font-weight:bold;
}

/* テーブル全体 */
.table-area{
	width: 100%;
    margin-top:50px;
    display:flex;
    justify-content:center;
}

/* テーブル */
table{
    border-collapse:collapse;
    width:100%;
	table-layout: fixed;
}

/* ヘッダー */
th{
    background:#006fb7;
    color:white;
    border:2px solid #222;
    font-size:20px;
    height:45px;
}

/* データ */
td{
    border:2px solid #222;
    text-align:center;
    font-size:18px;
    height:45px;
}

/* ボタン列 */
.btn-col{
    width:60px;
}

/* 詳細ボタン */
.detail-btn{
    width:55px;
    height:40px;
    border-radius:8px;
    background:#bdb7b7;
    border:1px solid #444;
    color:white;
    font-size:26px;
    cursor:pointer;
}

/* スクロールバー */
.scroll{
    position:absolute;
    right:90px;
    top:115px;
    width:28px;
    height:420px;
    background:#777;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.scroll button{
    width:100%;
    height:40px;
    background:#777;
    color:white;
    border:none;
    font-size:20px;
    cursor:pointer;
}

.bar{
    flex:1;
    width:8px;
    background:white;
    margin:5px 0;
}
.company{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    top:0;

    width:320px;
    height:75px;
    line-height:75px;
    text-align:center;
    border:1px solid #6ca0dc;
    border-radius:40px;
    color:#5d92d5;
    font-size:40px;
    font-weight:bold;
    background:#fff;
}
</style>
</head>
<body>
<div class="header">
<button class="back-btn" onclick="location.href='Login.html'">◀</button>
<div class="title">受験学生一覧</div>
<div class="company">
    企業名
</div>
</div>
<div class="table-area">
<table>

    <thead>

        <tr>
            <th>クラス番号</th>
            <th>出席番号</th>
            <th>氏名</th>
            <th>詳細</th>
            
        </tr>

    </thead>

</table>
</div>
</body>
</html>
